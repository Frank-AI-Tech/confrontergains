services:
  - type: web
    name: menu-builder-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot:flask_app --bind 0.0.0.0:$PORT
    envVars:
      - key: BOT_TOKEN
        value: YOUR_BOT_TOKEN_HERE
      - key: ADMIN_ID
        value: YOUR_TELEGRAM_USER_ID
      - key: WEBHOOK_URL
        value: https://your-service-name.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0
